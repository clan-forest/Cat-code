<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatCode Ultimate Cat Edition</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#111;
  color:white;
  text-align:center;
  padding:15px;
}
textarea{
  width:92%;
  height:340px;
  background:#050505;
  color:#00ff99;
  border:3px solid #00ff99;
  border-radius:15px;
  padding:15px;
  font-size:15px;
}
button{
  margin:8px;
  padding:13px 20px;
  font-size:17px;
  border:none;
  border-radius:12px;
  background:#00ff99;
  color:black;
  font-weight:bold;
}
#preview{
  margin-top:20px;
  background:white;
  color:black;
  border-radius:15px;
  padding:20px;
  min-height:250px;
}
.card{
  border:2px solid black;
  border-radius:15px;
  padding:15px;
  margin:10px;
}
input{
  padding:10px;
  border-radius:8px;
  border:1px solid gray;
}
#exportBox{
  display:none;
  white-space:pre-wrap;
  text-align:left;
  background:black;
  color:#00ff99;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}
</style>
</head>

<body>

<h1>🐱 CatCode Ultimate Cat Edition</h1>

<textarea id="code">fur {
background "lightblue"
color "black"
font "Arial"
}

kitten name = "Firestar"
kitten mood = "brave"

territory {
title "My CatCode Website"

purr "Welcome to CatCode!"
purr name

furpic "https://placekitten.com/300/200"

paw "Click Me" {
purr "Meow! You clicked the button!"
}

zoomies 3 {
purr "CatCode is awesome!"
}

whiskers mood == "brave" {
purr "The cat is brave!"
}

lionbrain "FirestarBot" {
learn "hello" -> "Hello! I am FirestarBot."
learn "hi" -> "Hi there!"
learn "cat" -> "Cats are awesome."
learn "who are you" -> "I am an AI made in CatCode."
default "I do not know that yet."
chat
}

}</textarea>

<br>

<button onclick="runCatCode()">Run CatCode</button>
<button onclick="exportCode()">Export Website</button>
<button onclick="clearPreview()">Clear</button>

<div id="preview"></div>
<div id="exportBox"></div>

<script>
let variables = {};
let exportedHTML = "";

function cleanQuotes(text){
  return text.replace(/^"/,"").replace(/"$/,"");
}

function getText(line){
  let first = line.indexOf('"');
  let last = line.lastIndexOf('"');

  if(first !== -1 && last !== -1 && last > first){
    return line.substring(first + 1, last);
  }

  let value = line.split(" ").slice(1).join(" ").trim();

  if(variables[value] !== undefined){
    return variables[value];
  }

  return value;
}

function add(html){
  document.getElementById("preview").innerHTML += html;
  exportedHTML += html + "\n";
}

function clearPreview(){
  document.getElementById("preview").innerHTML = "";
  document.getElementById("exportBox").style.display = "none";
}

function runCatCode(){
  variables = {};
  exportedHTML = "";

  let preview = document.getElementById("preview");
  preview.innerHTML = "";
  preview.style.background = "white";
  preview.style.color = "black";
  preview.style.fontFamily = "Arial";

  let code = document.getElementById("code").value;
  let lines = code.split("\n").map(x => x.trim()).filter(x => x);

  runBlock(lines);
}

function runBlock(lines){
  for(let i = 0; i < lines.length; i++){
    let line = lines[i];

    if(
      line === "territory {" ||
      line === "fur {" ||
      line === "}" ||
      line === "meow start" ||
      line === "meow end"
    ){
      continue;
    }

    if(line.startsWith("kitten ")){
      let parts = line.replace("kitten ","").split("=");
      let name = parts[0].trim();
      let value = cleanQuotes(parts[1].trim());
      variables[name] = value;
    }

    else if(line.startsWith("title ")){
      document.title = getText(line);
    }

    else if(line.startsWith("purr ")){
      add("<p>" + getText(line) + "</p>");
    }

    else if(line.startsWith("furpic ")){
      add('<img src="' + getText(line) + '" style="max-width:90%;border-radius:15px;"><br>');
    }

    else if(line.startsWith("catflix ")){
      add('<video controls style="max-width:90%;border-radius:15px;"><source src="' + getText(line) + '"></video><br>');
    }

    else if(line.startsWith("background ")){
      document.getElementById("preview").style.background = getText(line);
    }

    else if(line.startsWith("color ")){
      document.getElementById("preview").style.color = getText(line);
    }

    else if(line.startsWith("font ")){
      document.getElementById("preview").style.fontFamily = getText(line);
    }

    else if(line.startsWith("paw ")){
      let label = getText(line);
      let message = "Meow!";

      i++;
      while(i < lines.length && lines[i] !== "}"){
        if(lines[i].startsWith("purr ")){
          message = getText(lines[i]);
        }
        i++;
      }

      add('<button onclick="alert(\'' + message.replaceAll("'","\\'") + '\')">' + label + '</button>');
    }

    else if(line.startsWith("zoomies ")){
      let times = parseInt(line.split(" ")[1]);
      let inner = [];

      i++;
      while(i < lines.length && lines[i] !== "}"){
        inner.push(lines[i]);
        i++;
      }

      for(let r = 0; r < times; r++){
        runBlock(inner);
      }
    }

    else if(line.startsWith("whiskers ")){
      let condition = line.replace("whiskers ","").replace("{","").trim();
      let okay = false;
      let parts = condition.split("==");

      if(parts.length === 2){
        let left = parts[0].trim();
        let right = cleanQuotes(parts[1].trim());
        okay = variables[left] == right;
      }

      let inner = [];

      i++;
      while(i < lines.length && lines[i] !== "}"){
        inner.push(lines[i]);
        i++;
      }

      if(okay){
        runBlock(inner);
      }
    }

    else if(line.startsWith("lionbrain ")){
      let botName = getText(line);
      let brain = {};
      let defaultReply = "I do not know that yet.";

      i++;

      while(i < lines.length && lines[i] !== "}"){
        let aiLine = lines[i];

        if(aiLine.startsWith("learn ")){
          let match = aiLine.match(/learn\s+"(.*?)"\s*->\s*"(.*?)"/);
          if(match){
            brain[match[1].toLowerCase()] = match[2];
          }
        }

        else if(aiLine.startsWith("default ")){
          defaultReply = getText(aiLine);
        }

        else if(aiLine === "chat"){
          let id = "cat_ai_" + Math.floor(Math.random() * 999999);

          add(`
          <div class="card">
            <h2>🤖 ${botName}</h2>
            <input id="${id}_input" placeholder="Ask the AI...">
            <button onclick="catChat('${id}')">Send</button>
            <div id="${id}_out"></div>
          </div>
          `);

          window[id + "_brain"] = brain;
          window[id + "_default"] = defaultReply;
        }

        i++;
      }
    }

    else if(line.startsWith("adopt ")){
      add("<p>📁 Adopt/import works if you paste another CatCode file into this box.</p>");
    }

    else{
      add('<p style="color:red;">Unknown CatCode: ' + line + '</p>');
    }
  }
}

function catChat(id){
  let input = document.getElementById(id + "_input").value.toLowerCase().trim();
  let out = document.getElementById(id + "_out");
  let brain = window[id + "_brain"];
  let reply = brain[input] || window[id + "_default"];

  out.innerHTML += "<p><b>You:</b> " + input + "</p>";
  out.innerHTML += "<p><b>AI:</b> " + reply + "</p>";
}

function exportCode(){
  let box = document.getElementById("exportBox");
  box.style.display = "block";

  box.textContent =
`<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${document.title}</title>
<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}
button{
  padding:12px 18px;
  border-radius:10px;
}
img,video{
  max-width:90%;
  border-radius:15px;
}
.card{
  border:2px solid black;
  border-radius:15px;
  padding:15px;
  margin:10px;
}
</style>
</head>
<body>
${exportedHTML}
</body>
</html>`;
}
</script>

</body>
</html>
