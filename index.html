<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatCode</title>
<style>
body{margin:0;background:#111;color:white;font-family:Arial;padding:15px}
h1{color:#6cff8d;font-size:42px}
textarea{width:100%;height:330px;background:#000;color:#6cff8d;font-size:18px;padding:15px;border:2px solid #333;box-sizing:border-box}
button{padding:14px 22px;font-size:18px;border:0;border-radius:10px;margin:10px 5px 10px 0}
.box{background:#000;color:#00ff66;border:2px solid #333;padding:15px;min-height:130px;white-space:pre-wrap;font-size:18px}
#page{background:white;color:black;white-space:normal}
</style>
</head>
<body>

<h1>CatCode</h1>

<textarea id="code">make ai CatBrain

learn "AI means artificial intelligence."
learn "CatCode can make websites."
learn "Firestar is a brave warrior cat."

ask "What is AI?"
ask "What is CatCode?"
ask "Who is Firestar?"

say "Now making a page..."

page title "My CatCode Website"
page text "This website was made with CatCode."
page button "Click Me"

x = "hello"
print(x)

power = 1

repeat 5:
  power = power + 2
  print(power)

if power > 10:
  say "CatBrain is getting smarter!"</textarea>

<br>
<button onclick="runCode()">Run</button>
<button onclick="clearAll()">Clear</button>

<h2>Console</h2>
<div id="output" class="box"></div>

<h2>Page Preview</h2>
<div id="page" class="box"></div>

<script>
let aiName = "CatAI";
let aiMemory = [];

function clearAll(){
  document.getElementById("output").textContent = "";
  document.getElementById("page").innerHTML = "";
}

function runCode(){
  const lines = document.getElementById("code").value.split("\n");
  const out = document.getElementById("output");
  const page = document.getElementById("page");
  const vars = {};

  out.textContent = "";
  page.innerHTML = "";

  function say(text){
    out.textContent += text + "\n";
  }

  function quoted(line){
    let a = line.indexOf('"');
    let b = line.lastIndexOf('"');
    if(a >= 0 && b > a) return line.slice(a + 1, b);
    return "";
  }

  function value(x){
    x = x.trim();

    if(x.startsWith('"') && x.endsWith('"')) return x.slice(1,-1);
    if(!isNaN(x)) return Number(x);
    if(vars[x] !== undefined) return vars[x];

    if(x.includes("+")){
      let p = x.split("+");
      return Number(value(p[0])) + Number(value(p[1]));
    }

    if(x.includes("-")){
      let p = x.split("-");
      return Number(value(p[0])) - Number(value(p[1]));
    }

    return x;
  }

  function answer(question){
    let q = question.toLowerCase();
    let best = "";

    for(let fact of aiMemory){
      let f = fact.toLowerCase();
      let words = q.replace(/what is|who is|what are|who are|\?/g,"").split(" ");

      for(let word of words){
        word = word.trim();
        if(word.length > 2 && f.includes(word)){
          best = fact;
        }
      }
    }

    if(best) return aiName + ": " + best;
    return aiName + ': I do not know yet. Teach me using learn "fact".';
  }

  function blockEnd(start){
    for(let i = start; i < lines.length; i++){
      if(lines[i].trim() === "") continue;
      if(!lines[i].startsWith(" ") && !lines[i].startsWith("\t")) return i;
    }
    return lines.length;
  }

  function runBlock(start,end){
    for(let i = start; i < end; i++){
      let line = lines[i].trim();
      if(line === "" || line.startsWith("//")) continue;

      if(line.startsWith("say ")){
        say(value(line.slice(4)));
      }

      else if(line.startsWith("print")){
        let inside = line.substring(line.indexOf("(")+1,line.lastIndexOf(")"));
        say(value(inside));
      }

      else if(line.startsWith("make ai ")){
        aiName = line.slice(8).trim();
        say("Created AI: " + aiName);
      }

      else if(line.startsWith("makeai ")){
        aiName = line.slice(7).trim();
        say("Created AI: " + aiName);
      }

      else if(line.startsWith("learn ")){
        let fact = quoted(line);
        aiMemory.push(fact);
        say(aiName + " learned: " + fact);
      }

      else if(line.startsWith("ask ")){
        let q = quoted(line);
        say("You asked: " + q);
        say(answer(q));
      }

      else if(line.startsWith("page title ")){
        page.innerHTML += "<h1>" + quoted(line) + "</h1>";
      }

      else if(line.startsWith("page text ")){
        page.innerHTML += "<p>" + quoted(line) + "</p>";
      }

      else if(line.startsWith("page button ")){
        page.innerHTML += "<button onclick='alert(\"CatCode button clicked!\")'>" + quoted(line) + "</button>";
      }

      else if(line.includes("=") && !line.includes("==")){
        let p = line.split("=");
        let name = p[0].trim();
        let val = p.slice(1).join("=").trim();
        vars[name] = value(val);
      }

      else if(line.startsWith("repeat ") && line.endsWith(":")){
        let amount = Number(value(line.slice(7,-1)));
        let endLine = blockEnd(i + 1);

        for(let r = 0; r < amount; r++){
          runBlock(i + 1,endLine);
        }

        i = endLine - 1;
      }

      else if(line.startsWith("if ") && line.endsWith(":")){
        let condition = line.slice(3,-1).trim().split(" ");
        let left = value(condition[0]);
        let op = condition[1];
        let right = value(condition[2]);
        let ok = false;

        if(op === ">") ok = left > right;
        if(op === "<") ok = left < right;
        if(op === "==") ok = left == right;
        if(op === "!=") ok = left != right;

        let endLine = blockEnd(i + 1);

        if(ok) runBlock(i + 1,endLine);

        i = endLine - 1;
      }

      else{
        say("Error: I do not understand: " + line);
      }
    }
  }

  runBlock(0,lines.length);
}
</script>

</body>
</html>
