<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatCode WebPy</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:white;padding:15px}
h1{color:#7CFF9B}
textarea{width:100%;height:330px;background:#050505;color:#7CFF9B;font-size:15px;padding:10px;box-sizing:border-box}
button{padding:12px 16px;margin:6px 4px 6px 0;border:0;border-radius:8px;font-size:16px}
#output,#page{background:black;color:#00ff66;padding:15px;margin-top:15px;min-height:120px;white-space:pre-wrap;border:2px solid #333}
#page{background:white;color:black;white-space:normal}
</style>
</head>
<body>

<h1>CatCode WebPy</h1>

<textarea id="code"><page>
title "My CatCode Website"
text "Hello from CatCode!"
button "Click Me"
</page>

print("Python style works!")

name = "Firestar"
print(name)

power = 5
power = power + 10
print(power)

if power > 10:
  print("Powerful AI mode!")

repeat 3:
  print("Training...")</textarea>

<br>
<button onclick="runCode()">Run</button>
<button onclick="clearAll()">Clear</button>

<h2>Console</h2>
<div id="output"></div>

<h2>Page Preview</h2>
<div id="page"></div>

<script>
function clearAll(){
  document.getElementById("output").textContent="";
  document.getElementById("page").innerHTML="";
}

function runCode(){
  const code=document.getElementById("code").value.split("\n");
  const out=document.getElementById("output");
  const page=document.getElementById("page");
  const vars={};

  out.textContent="";
  page.innerHTML="";

  function print(x){out.textContent+=x+"\n";}

  function value(x){
    x=x.trim();

    if(x.startsWith('"')&&x.endsWith('"')) return x.slice(1,-1);
    if(!isNaN(x)) return Number(x);
    if(vars[x]!==undefined) return vars[x];

    if(x.includes("+")){
      let p=x.split("+");
      return Number(value(p[0]))+Number(value(p[1]));
    }

    if(x.includes("-")){
      let p=x.split("-");
      return Number(value(p[0]))-Number(value(p[1]));
    }

    return x;
  }

  function getText(line){
    let start=line.indexOf('"');
    let end=line.lastIndexOf('"');
    if(start>=0&&end>start) return line.slice(start+1,end);
    return "";
  }

  function findBlockEnd(start){
    for(let i=start+1;i<code.length;i++){
      let line=code[i];
      if(!line.startsWith(" ")&&!line.startsWith("\t")) return i;
    }
    return code.length;
  }

  function runLines(start,end){
    for(let i=start;i<end;i++){
      let line=code[i].trim();
      if(line===""||line.startsWith("//")) continue;

      if(line==="<page>"||line==="</page>") continue;

      if(line.startsWith("title ")){
        page.innerHTML+="<h1>"+getText(line)+"</h1>";
      }

      else if(line.startsWith("text ")){
        page.innerHTML+="<p>"+getText(line)+"</p>";
      }

      else if(line.startsWith("button ")){
        page.innerHTML+="<button onclick='alert(\"CatCode button clicked!\")'>"+getText(line)+"</button>";
      }

      else if(line.startsWith("image ")){
        page.innerHTML+="<img src='"+getText(line)+"' style='max-width:100%'>";
      }

      else if(line.startsWith("print(")){
        let inside=line.slice(6,-1);
        print(value(inside));
      }

      else if(line.includes("=")&&!line.includes("==")){
        let p=line.split("=");
        let name=p[0].trim();
        let val=p.slice(1).join("=").trim();
        vars[name]=value(val);
      }

      else if(line.startsWith("if ")&&line.endsWith(":")){
        let condition=line.slice(3,-1).trim();
        let p=condition.split(" ");
        let left=value(p[0]);
        let op=p[1];
        let right=value(p[2]);
        let blockEnd=findBlockEnd(i+1);

        let ok=false;
        if(op===">") ok=left>right;
        if(op==="<") ok=left<right;
        if(op==="==") ok=left==right;
        if(op==="!=") ok=left!=right;

        if(ok) runLines(i+1,blockEnd);
        i=blockEnd-1;
      }

      else if(line.startsWith("repeat ")&&line.endsWith(":")){
        let amount=Number(value(line.slice(7,-1)));
        let blockEnd=findBlockEnd(i+1);

        for(let r=0;r<amount;r++){
          runLines(i+1,blockEnd);
        }

        i=blockEnd-1;
      }

      else{
        print("Error: I do not understand: "+line);
      }
    }
  }

  runLines(0,code.length);
}
</script>

</body>
</html>
