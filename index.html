<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatCode Interactive AI</title>
<style>
body{margin:0;background:#111;color:white;font-family:Arial;padding:15px}
h1{color:#6cff8d;font-size:40px}
textarea{width:100%;height:300px;background:#000;color:#6cff8d;font-size:17px;padding:12px;border:2px solid #333;box-sizing:border-box}
button{padding:13px 18px;font-size:17px;border:0;border-radius:10px;margin:8px 4px}
.box{background:#000;color:#00ff66;border:2px solid #333;padding:15px;min-height:120px;white-space:pre-wrap;font-size:17px}
#page{background:white;color:black;white-space:normal}
#chatBox{display:flex;gap:8px;margin-top:10px}
#chatInput{flex:1;padding:12px;font-size:17px;border-radius:8px;border:0}
</style>
</head>
<body>

<h1>CatCode Interactive AI</h1>

<textarea id="code">make ai CatBrain

learn "AI means artificial intelligence."
learn "CatCode is a coding language that can make websites and simple AI."
learn "HTML is used to build websites."
learn "Python is used for apps, games, automation, and AI."
learn "Firestar is a brave warrior cat."

say "CatBrain is ready."
say "Use the chat box below to talk to the AI."

page title "CatBrain AI"
page text "This page was created with CatCode."
page button "Click Me"

power = 1

repeat 5:
  power = power + 2
  print(power)

if power > 10:
  say "CatBrain is getting smarter!"</textarea>

<br>
<button onclick="runCode()">Run CatCode</button>
<button onclick="clearAll()">Clear</button>

<h2>Console</h2>
<div id="output" class="box"></div>

<h2>Talk to the AI</h2>
<div id="chat" class="box"></div>
<div id="chatBox">
<input id="chatInput" placeholder="Ask the AI something...">
<button onclick="chatAsk()">Ask</button>
</div>

<h2>Page Preview</h2>
<div id="page" class="box"></div>

<script>
let aiName = "CatAI";
let aiMemory = [];
let vars = {};

function clearAll(){
  document.getElementById("output").textContent = "";
  document.getElementById("chat").textContent = "";
  document.getElementById("page").innerHTML = "";
  aiMemory = [];
  vars = {};
}

function runCode(){
  const lines = document.getElementById("code").value.split("\n");
  const out = document.getElementById("output");
  const page = document.getElementById("page");

  out.textContent = "";
  page.innerHTML = "";
  aiMemory = [];
  vars = {};

  function say(text){
    out.textContent += text + "\n";
  }

  function quoted(line){
    let a = line.indexOf('"');
    let b = line.lastIndexOf('"');
    if(a >= 0 && b > a) return line.slice(a + 1, b);
    return "";
  }

  function value(x){
    x = x.trim();

    if(x.startsWith('"') && x.endsWith('"')) return x.slice(1,-1);
    if(!isNaN(x)) return Number(x);
    if(vars[x] !== undefined) return vars[x];

    if(x.includes("+")){
      let p = x.split("+");
      return Number(value(p[0])) + Number(value(p[1]));
    }

    if(x.includes("-")){
      let p = x.split("-");
      return Number(value(p[0])) - Number(value(p[1]));
    }

    return x;
  }

  function answer(question){
    let q = question.toLowerCase();
    let cleaned = q.replace(/what is|who is|what are|who are|tell me about|\?/g,"").trim();
    let best = "";
    let bestScore = 0;

    for(let fact of aiMemory){
      let score = 0;
      let words = cleaned.split(" ");

      for(let word of words){
        word = word.trim();
        if(word.length > 2 && fact.toLowerCase().includes(word)){
          score++;
        }
      }

      if(score > bestScore){
        bestScore = score;
        best = fact;
      }
    }

    if(bestScore > 0) return aiName + ": " + best;

    if(q.includes("hello") || q.includes("hi")){
      return aiName + ": Hello! Ask me something I learned.";
    }

    if(q.includes("your name")){
      return aiName + ": My name is " + aiName + ".";
    }

    return aiName + ': I do not know yet. Add a line like: learn "Your fact here."';
  }

  window.catAnswer = answer;

  function blockEnd(start){
    for(let i = start; i < lines.length; i++){
      if(lines[i].trim() === "") continue;
      if(!lines[i].startsWith(" ") && !lines[i].startsWith("\t")) return i;
    }
    return lines.length;
  }

  function runBlock(start,end){
    for(let i = start; i < end; i++){
      let line = lines[i].trim();
      if(line === "" || line.startsWith("//")) continue;

      if(line.startsWith("say ")){
        say(value(line.slice(4)));
      }

      else if(line.startsWith("print")){
        let inside = line.substring(line.indexOf("(")+1,line.lastIndexOf(")"));
        say(value(inside));
      }

      else if(line.startsWith("make ai ")){
        aiName = line.slice(8).trim();
        say("Created AI: " + aiName);
      }

      else if(line.startsWith("makeai ")){
        aiName = line.slice(7).trim();
        say("Created AI: " + aiName);
      }

      else if(line.startsWith("learn ")){
        let fact = quoted(line);
        aiMemory.push(fact);
        say(aiName + " learned: " + fact);
      }

      else if(line.startsWith("ask ")){
        let q = quoted(line);
        say("You asked: " + q);
        say(answer(q));
      }

      else if(line.startsWith("page title ")){
        page.innerHTML += "<h1>" + quoted(line) + "</h1>";
      }

      else if(line.startsWith("page text ")){
        page.innerHTML += "<p>" + quoted(line) + "</p>";
      }

      else if(line.startsWith("page button ")){
        page.innerHTML += "<button onclick='alert(\"CatCode button clicked!\")'>" + quoted(line) + "</button>";
      }

      else if(line.includes("=") && !line.includes("==")){
        let p = line.split("=");
        let name = p[0].trim();
        let val = p.slice(1).join("=").trim();
        vars[name] = value(val);
      }

      else if(line.startsWith("repeat ") && line.endsWith(":")){
        let amount = Number(value(line.slice(7,-1)));
        let endLine = blockEnd(i + 1);

        for(let r = 0; r < amount; r++){
          runBlock(i + 1,endLine);
        }

        i = endLine - 1;
      }

      else if(line.startsWith("if ") && line.endsWith(":")){
        let condition = line.slice(3,-1).trim().split(" ");
        let left = value(condition[0]);
        let op = condition[1];
        let right = value(condition[2]);
        let ok = false;

        if(op === ">") ok = left > right;
        if(op === "<") ok = left < right;
        if(op === "==") ok = left == right;
        if(op === "!=") ok = left != right;

        let endLine = blockEnd(i + 1);

        if(ok) runBlock(i + 1,endLine);

        i = endLine - 1;
      }

      else{
        say("Error: I do not understand: " + line);
      }
    }
  }

  runBlock(0,lines.length);
}

function chatAsk(){
  let input = document.getElementById("chatInput");
  let chat = document.getElementById("chat");
  let q = input.value.trim();

  if(q === "") return;

  chat.textContent += "You: " + q + "\n";

  if(typeof window.catAnswer === "function"){
    chat.textContent += window.catAnswer(q) + "\n\n";
  } else {
    chat.textContent += "CatAI: Press Run CatCode first.\n\n";
  }

  input.value = "";
}

document.getElementById("chatInput").addEventListener("keydown", function(e){
  if(e.key === "Enter") chatAsk();
});
</script>

</body>
</html>
