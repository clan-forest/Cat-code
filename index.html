<!DOCTYPE html>
<html>
<head>
  <title>CatCode Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    textarea {
      width: 90%;
      height: 220px;
      background: #222;
      color: #00ff99;
      border: 2px solid #00ff99;
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #00ff99;
      color: black;
      font-weight: bold;
    }

    #output {
      margin-top: 20px;
      background: black;
      color: #00ff99;
      padding: 15px;
      border-radius: 10px;
      min-height: 120px;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>🐱 CatCode Runner</h1>

  <textarea id="code">meow start
purr "Hello from CatCode!"
kitten name = "Firestar"
purr name
repeat 3 {
purr "Meow!"
}
meow end</textarea>

  <br>

  <button onclick="runCatCode()">Run CatCode</button>

  <div id="output"></div>

  <script>
    function runCatCode() {
      const code = document.getElementById("code").value;
      const output = document.getElementById("output");
      output.textContent = "";

      let variables = {};
      let lines = code.split("\n").map(line => line.trim()).filter(line => line !== "");

      function print(text) {
        output.textContent += text + "\n";
      }

      function getValue(value) {
        value = value.trim();

        if (value.startsWith('"') && value.endsWith('"')) {
          return value.slice(1, -1);
        }

        if (variables[value] !== undefined) {
          return variables[value];
        }

        return value;
      }

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        if (line === "meow start" || line === "meow end") {
          continue;
        }

        if (line.startsWith("purr ")) {
          let value = line.replace("purr ", "");
          print(getValue(value));
        }

        else if (line.startsWith("kitten ")) {
          let parts = line.replace("kitten ", "").split("=");
          let name = parts[0].trim();
          let value = getValue(parts[1]);
          variables[name] = value;
        }

        else if (line.startsWith("repeat ")) {
          let times = parseInt(line.split(" ")[1]);
          let block = [];

          i++;

          while (i < lines.length && lines[i] !== "}") {
            if (lines[i] !== "{") {
              block.push(lines[i]);
            }
            i++;
          }

          for (let r = 0; r < times; r++) {
            for (let b of block) {
              if (b.startsWith("purr ")) {
                let value = b.replace("purr ", "");
                print(getValue(value));
              }
            }
          }
        }

        else {
          print("Error: Unknown CatCode command: " + line);
        }
      }
    }
  </script>

</body>
</html>
