<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatCode Website Maker</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}
textarea{
  width:90%;
  height:260px;
  background:#222;
  color:#00ff99;
  border:3px solid #00ff99;
  border-radius:15px;
  padding:15px;
  font-size:16px;
}
button{
  margin:10px;
  padding:15px 25px;
  font-size:20px;
  border:none;
  border-radius:15px;
  background:#00ff99;
  color:black;
  font-weight:bold;
}
#preview{
  margin-top:20px;
  background:white;
  color:black;
  border-radius:15px;
  padding:20px;
  min-height:250px;
  text-align:center;
}
</style>
</head>

<body>

<h1>🐱 CatCode Website Maker</h1>

<textarea id="code">page {
title "My Cat Site"
heading "Welcome"
text "This website was made with CatCode!"
image "https://placekitten.com/300/200"
button "Click Me" {
purr "Button pressed!"
}
background "lightblue"
color "black"
}</textarea>

<br>

<button onclick="runCatCode()">Run CatCode</button>

<div id="preview"></div>

<script>
function runCatCode(){
  const code = document.getElementById("code").value;
  const preview = document.getElementById("preview");

  preview.innerHTML = "";
  preview.style.background = "white";
  preview.style.color = "black";

  let lines = code.split("\n").map(l => l.trim()).filter(l => l !== "");

  for(let i = 0; i < lines.length; i++){
    let line = lines[i];

    if(line === "page {" || line === "}" || line === "meow start" || line === "meow end"){
      continue;
    }

    if(line.startsWith("title ")){
      let text = getText(line);
      document.title = text;
    }

    else if(line.startsWith("heading ")){
      let text = getText(line);
      preview.innerHTML += `<h1>${text}</h1>`;
    }

    else if(line.startsWith("text ")){
      let text = getText(line);
      preview.innerHTML += `<p>${text}</p>`;
    }

    else if(line.startsWith("image ")){
      let src = getText(line);
      preview.innerHTML += `<img src="${src}" style="max-width:90%;border-radius:15px;">`;
    }

    else if(line.startsWith("background ")){
      let color = getText(line);
      preview.style.background = color;
    }

    else if(line.startsWith("color ")){
      let color = getText(line);
      preview.style.color = color;
    }

    else if(line.startsWith("button ")){
      let label = getText(line);
      let message = "Meow!";

      i++;
      while(i < lines.length && lines[i] !== "}"){
        if(lines[i].startsWith("purr ")){
          message = getText(lines[i]);
        }
        i++;
      }

      preview.innerHTML += `<br><button onclick="alert('${message}')">${label}</button>`;
    }

    else{
      preview.innerHTML += `<p style="color:red;">Unknown CatCode: ${line}</p>`;
    }
  }
}

function getText(line){
  let first = line.indexOf('"');
  let last = line.lastIndexOf('"');
  if(first !== -1 && last !== -1 && last > first){
    return line.substring(first + 1, last);
  }
  return "";
}
</script>

</body>
</html>
